version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Gabi0510
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Gabi0510
      POSTGRES_DB: mensageria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./app
    container_name: api-mensageria
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
      - postgres
    environment:
      DB_URL: postgresql+psycopg2://postgres:Gabi0510@postgres:5432/mensageria

volumes:
  rabbitmq_data:
  postgres_data: